<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Longo Coffee</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="animate-fade-in">

  <div class="auth-container animate-fade-up">
    <div class="auth-card">

      <a href="/" class="auth-brand">Longo</a>
      <p class="text-sm text-muted text-center mb-6">Choose a new password</p>

      <div class="auth-error" id="auth-error"></div>

      <!-- Shown when token is missing/invalid -->
      <div id="invalid-token-msg" style="display:none; text-align:center;">
        <p class="text-negative mb-4">This reset link is invalid or has expired.</p>
        <a href="/forgot-password" class="btn btn-primary">Request a New Link</a>
      </div>

      <!-- Reset form -->
      <form id="reset-form">
        <div class="form-group">
          <label class="form-label" for="new-password">
            New Password <em class="auth-required">*</em>
          </label>
          <div class="password-wrapper">
            <input type="password" id="new-password" class="form-input" required placeholder="Min. 8 characters">
            <button type="button" class="password-toggle" data-target="new-password" aria-label="Toggle password">
              <span class="material-symbols-outlined">visibility_off</span>
            </button>
          </div>
          <div class="password-requirements" id="reset-requirements">
            <span id="reset-req-length">✗ At least 8 characters</span>
            <span id="reset-req-special">✗ At least 1 special character (!@#$%^&amp;*)</span>
          </div>
        </div>

        <div class="form-group mb-6">
          <label class="form-label" for="confirm-password">
            Confirm Password <em class="auth-required">*</em>
          </label>
          <div class="password-wrapper">
            <input type="password" id="confirm-password" class="form-input" required placeholder="Repeat password">
            <button type="button" class="password-toggle" data-target="confirm-password" aria-label="Toggle confirm password">
              <span class="material-symbols-outlined">visibility_off</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;" id="reset-submit">
          Set New Password
        </button>
      </form>

    </div>
  </div>

  <footer class="auth-footer">
    &copy; 2026 Longo Coffee
  </footer>

  <script src="/js/auth.js"></script>
</body>
</html>
