<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Longo Coffee</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="animate-fade-in">

  <div class="auth-container animate-fade-up">
    <div class="auth-card">

      <a href="/" class="auth-brand">Longo</a>
      <p class="text-sm text-muted text-center mb-6">Reset your password</p>

      <div class="auth-error" id="auth-error"></div>
      <div class="auth-success" id="reset-success"></div>

      <form id="forgot-form">
        <div class="form-group mb-6">
          <label class="form-label" for="forgot-email">
            Email Address <em class="auth-required">*</em>
          </label>
          <input type="email" id="forgot-email" class="form-input" required
                 placeholder="name@example.com" autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="forgot-submit">
          Send Reset Link
        </button>
      </form>

      <p class="text-xs text-muted text-center mt-6">
        Remembered it? <a href="/auth" class="auth-back-link">Back to Login</a>
      </p>

    </div>
  </div>

  <footer class="auth-footer">
    &copy; 2026 Longo Coffee
  </footer>

  <script src="/js/auth.js"></script>
</body>
</html>
